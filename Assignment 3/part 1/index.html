<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!--
    Name: Jordan Avery
    File: index.html
    Date: 24 April 2026
    A simple digital business card with contact details.
    -->
    <main class="page-shell">
        <section class="business-card">
            <img src="images/avatar.svg" alt="Profile avatar" class="profile-image" />
            <div class="card-content">
                <h1>Jordan Avery</h1>
                <p class="role">Aspiring Web Designer</p>
                <p class="bio">Focused on clean interfaces, strong typography, and user-first digital experiences.</p>
                <div class="contact-list">
                    <p><strong>Email:</strong> <a href="mailto:jordan.avery@example.com">jordan.avery@example.com</a></p>
                    <p><strong>Phone:</strong> <a href="tel:+1234567890">+1 (234) 567-890</a></p>
                    <p><strong>Portfolio:</strong> <a href="https://example.com" target="_blank" rel="noreferrer">example.com</a></p>
                </div>
                <a class="contact-button" href="mailto:jordan.avery@example.com">Contact Me</a>
            </div>
        </section>
    </main>
</body>
</html>
